name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest PyYAML fastapi pydantic ollama

      - name: Run focused smoke tests
        run: |
          pytest \
            tests/test_model_packages.py \
            tests/test_model_manager.py \
            tests/test_cli_parser.py \
            tests/test_api_metadata.py
