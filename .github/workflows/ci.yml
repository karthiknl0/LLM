name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Keep CI lightweight. These cover pure-logic tests for the CLI,
      # model manager, LocalModel packages, runtime factory, and API shape.
      # Heavy ML/UI/media dependencies are intentionally not installed here.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ollama PyYAML fastapi pydantic

      - name: Syntax-check core modules
        run: |
          python -m py_compile app/*.py
          python -m py_compile app/api/*.py app/models/*.py app/model_packages/*.py app/runtime/*.py
          python -m py_compile finetune/*.py evolve/*.py

      - name: Enforce the 800-line file limit
        run: |
          over=$(find app finetune evolve -name '*.py' -type f -print0 | xargs -0 wc -l | awk '$1 >= 800 && $2 != "total" {print $2}')
          if [ -n "$over" ]; then echo "Files over 800 lines:"; echo "$over"; exit 1; fi

      - name: Run tests
        run: python -m pytest tests/ -q
